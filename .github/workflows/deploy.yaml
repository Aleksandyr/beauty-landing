# GitHub repo → Settings → Pages:
#   * Source MUST be "Deploy from a branch" → Branch: gh-pages, Folder: / (root).
#   * Do NOT use "GitHub Actions" as the source unless you switch to deploy-pages + upload-artifact;
#     this workflow uses peaceiris, which pushes static files to the gh-pages branch.
#   * Add custom domain there (same as DNS) and wait for DNS check / HTTPS.
#
# Contact form on Pages: the browser must POST to a real API host (not this domain).
# Add a repository Secret OR Variable named exactly: VITE_CONTACT_API_URL
# Value example: https://your-api.example.com/api/contact
# (Vite only embeds env names starting with VITE_. Names like API_KEY are not used here.)
name: Deploy React Vite to GitHub Pages

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    # Required so GITHUB_TOKEN can push the gh-pages branch (default is often read-only).
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Version comes from package.json "packageManager" (pnpm/action-setup reads it).
      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Vite app
        env:
          # Secret preferred; Variables tab works too (same name).
          VITE_CONTACT_API_URL: ${{ secrets.VITE_CONTACT_API_URL || vars.VITE_CONTACT_API_URL }}
        run: |
          if [ "${{ github.event_name }}" = "push" ] && [ "${{ github.ref }}" = "refs/heads/main" ]; then
            if [ -z "$VITE_CONTACT_API_URL" ]; then
              echo "::error::Missing VITE_CONTACT_API_URL. In the repo: Settings → Secrets and variables → Actions — add a Secret OR a Variable with that exact name, value = full HTTPS URL of your contact API (where Resend runs). Push again after saving."
              exit 1
            fi
          fi
          pnpm run build

      - name: Verify static output
        run: |
          test -f dist/public/index.html || (echo "Missing dist/public/index.html" && exit 1)
          ls -la dist/public | head -30

      # PRs (especially from forks) cannot push; only deploy from main.
      - name: Deploy to GitHub Pages
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist/public
          cname: cvetelinakamenova.com
