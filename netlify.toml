[build]
  command = "pnpm build"
  publish = "dist/public"

[functions]
  directory = "netlify/functions"

[build.environment]
  # Netlify supports Node 22 broadly; Node 24 may not be available.
  NODE_VERSION = "22"
  PNPM_VERSION = "10.4.1"
  # Skip scanning for keys whose values often appear harmlessly in docs or public SMTP hostnames.
  SECRETS_SCAN_OMIT_KEYS = "SMTP_HOST,CONTACT_TO_EMAIL"
  # Optional: extra paths/globs (comma-separated) to skip scanning.
  SECRETS_SCAN_OMIT_PATHS = ".env.example"

# API must be before the SPA fallback; static Netlify sites do not run Express from `server/index.ts`.
[[redirects]]
  from = "/api/contact"
  to = "/.netlify/functions/contact"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

