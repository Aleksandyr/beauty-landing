[build]
  command = "pnpm build"
  publish = "dist/public"

[build.environment]
  # Netlify supports Node 22 broadly; Node 24 may not be available.
  NODE_VERSION = "22"
  PNPM_VERSION = "10.4.1"
  # Skip scanning for keys whose values often appear harmlessly in docs or public SMTP hostnames.
  SECRETS_SCAN_OMIT_KEYS = "SMTP_HOST,CONTACT_TO_EMAIL"
  # Optional: extra paths/globs (comma-separated) to skip scanning.
  SECRETS_SCAN_OMIT_PATHS = ".env.example"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

